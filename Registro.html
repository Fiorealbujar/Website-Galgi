<div class="formulario-contacto">

<form onsubmit="return validarRegistro()">

<h1 class="titulo-form">Crea tu cuenta en Galgi</h1>
<p class="subtitulo-form">Accede a nuestros servicios exclusivos</p>


<label>Nombre</label><br>
<input type="text" id="reg_nombre">
<p id="err_nombre" class="mensaje-error"></p>


<label>Apellidos</label><br>
<input type="text" id="reg_apellido">
<p id="err_apellido" class="mensaje-error"></p>


<label>Email</label><br>
<input type="email" id="reg_email">
<p id="err_email" class="mensaje-error"></p>


<label>Teléfono</label><br>
<input type="text" id="reg_telefono">
<p id="err_telefono" class="mensaje-error"></p>


<label>Usuario</label><br>
<input type="text" id="reg_usuario">
<p id="err_usuario" class="mensaje-error"></p>


<label>Contraseña</label><br>
<input type="password" id="reg_pass">
<p id="err_pass" class="mensaje-error"></p>


<label>Confirmar contraseña</label><br>
<input type="password" id="reg_pass2">
<p id="err_pass2" class="mensaje-error"></p>


<br>

<input type="checkbox" id="condiciones">
Acepto las condiciones

<p id="err_condiciones" class="mensaje-error"></p>


<br><br>

<button type="submit">Registrarse</button>
<button type="reset">Cancelar</button>
